<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sei offline — Geekore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #7c3aed, #a21caf);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      font-size: 32px;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 10px; }
    p { color: #71717a; font-size: 15px; line-height: 1.6; max-width: 320px; margin-bottom: 32px; }
    button {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    .hint { color: #3f3f46; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="icon">⚡</div>
  <h1>Sei offline</h1>
  <p>Connettiti a Internet per usare Geekore. Le pagine visitate di recente potrebbero essere ancora disponibili.</p>
  <button onclick="window.location.reload()">Riprova</button>
  <p class="hint">Le tue collezioni sono al sicuro — ci vediamo quando torni online.</p>
</body>
</html>
