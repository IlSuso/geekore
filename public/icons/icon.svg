<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep violet → fuchsia -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4c1d95"/>
      <stop offset="45%"  stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>

    <!-- Top-left glass highlight -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Bolt glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="normal"/>
    </filter>

    <!-- Bolt drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ── Glass shine overlay ── -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- ── Soft radial glow behind bolt ── -->
  <ellipse cx="256" cy="250" rx="155" ry="155" fill="#a78bfa" opacity="0.18"/>

  <!-- ── Lightning bolt (Lucide Zap) ──
       Original 24×24 viewBox, scaled ×13 (= 312px) and centered in 512px
       translate(256,256) moves to center, scale(13), translate(-12,-12) re-centers the 24×24 box -->
  <!-- Glow layer (blurred white duplicate) -->
  <g transform="translate(256,256) scale(13) translate(-12,-12)" filter="url(#glow)" opacity="0.35">
    <path d="M13 2L4.09 12.97 12 12l-1 9 8.91-10.97L12 11z" fill="white"/>
  </g>

  <!-- Main bolt with drop shadow -->
  <g transform="translate(256,256) scale(13) translate(-12,-12)" filter="url(#shadow)">
    <path d="M13 2L4.09 12.97 12 12l-1 9 8.91-10.97L12 11z" fill="white"/>
  </g>
</svg>
